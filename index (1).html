<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadFlow CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4ff;
      --white: #ffffff;
      --accent: #4f46e5;
      --accent2: #e0473d;
      --green: #16a34a;
      --yellow: #d97706;
      --blue: #0284c7;
      --text: #1e1b4b;
      --muted: #6b7280;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(79,70,229,0.10);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Header ── */
    header {
      background: var(--accent);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 16px rgba(79,70,229,0.3);
    }
    .logo { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; letter-spacing:-0.5px; }
    .logo span { color:#a5b4fc; }
    header button {
      background:#fff; color:var(--accent);
      border:none; padding:10px 22px; border-radius:10px;
      font-family:'Nunito',sans-serif; font-weight:700; font-size:14px;
      cursor:pointer; transition:transform 0.15s;
    }
    header button:hover { transform:scale(1.04); }

    /* ── Stats ── */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:28px 32px 0; }
    .stat {
      background:var(--white); border-radius:14px; padding:20px 22px;
      box-shadow:var(--shadow); border-left:4px solid transparent;
      transition:transform 0.2s;
    }
    .stat:hover { transform:translateY(-2px); }
    .stat.all   { border-color:var(--accent); }
    .stat.new   { border-color:var(--blue); }
    .stat.cont  { border-color:var(--yellow); }
    .stat.conv  { border-color:var(--green); }
    .stat-num { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; }
    .stat.all  .stat-num { color:var(--accent); }
    .stat.new  .stat-num { color:var(--blue); }
    .stat.cont .stat-num { color:var(--yellow); }
    .stat.conv .stat-num { color:var(--green); }
    .stat-label { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.7px; margin-top:4px; }

    /* ── Filters ── */
    .toolbar { display:flex; gap:12px; align-items:center; padding:22px 32px; flex-wrap:wrap; }
    .search {
      flex:1; min-width:200px;
      border:1.5px solid var(--border); border-radius:10px;
      padding:10px 16px; font-family:'Nunito',sans-serif; font-size:14px;
      background:var(--white); outline:none; transition:border 0.2s;
    }
    .search:focus { border-color:var(--accent); }
    .filters { display:flex; gap:6px; }
    .ftab {
      padding:8px 18px; border-radius:8px; border:1.5px solid var(--border);
      background:var(--white); font-family:'Nunito',sans-serif;
      font-weight:600; font-size:13px; cursor:pointer; color:var(--muted);
      transition:all 0.18s;
    }
    .ftab.active, .ftab:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* ── Cards Grid ── */
    .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; padding:0 32px 32px; }

    .card {
      background:var(--white); border-radius:16px;
      padding:22px; box-shadow:var(--shadow);
      border-top:4px solid var(--border);
      transition:transform 0.2s, box-shadow 0.2s;
      animation:popIn 0.3s ease;
    }
    @keyframes popIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .card:hover { transform:translateY(-3px); box-shadow:0 8px 32px rgba(79,70,229,0.15); }
    .card.new-lead  { border-color:var(--blue); }
    .card.contacted { border-color:var(--yellow); }
    .card.converted { border-color:var(--green); }

    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .lead-name { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
    .lead-email { font-size:13px; color:var(--muted); margin-top:2px; }

    .badge {
      padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.5px;
    }
    .badge.new-lead  { background:#dbeafe; color:var(--blue); }
    .badge.contacted { background:#fef3c7; color:var(--yellow); }
    .badge.converted { background:#dcfce7; color:var(--green); }

    .card-info { font-size:13px; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .card-notes {
      font-size:13px; color:var(--text); background:var(--bg);
      border-radius:8px; padding:10px 12px; margin:12px 0;
      line-height:1.5; min-height:40px;
    }

    .card-footer { display:flex; gap:8px; margin-top:14px; }
    .btn-edit, .btn-del, .btn-status {
      flex:1; padding:8px; border-radius:8px; border:none;
      font-family:'Nunito',sans-serif; font-weight:700; font-size:12px;
      cursor:pointer; transition:all 0.15s;
    }
    .btn-edit   { background:#ede9fe; color:var(--accent); }
    .btn-edit:hover { background:var(--accent); color:#fff; }
    .btn-del    { background:#fee2e2; color:var(--accent2); }
    .btn-del:hover  { background:var(--accent2); color:#fff; }
    .btn-status { background:#f0fdf4; color:var(--green); }
    .btn-status:hover { background:var(--green); color:#fff; }

    .empty { text-align:center; padding:60px; color:var(--muted); grid-column:1/-1; }
    .empty .big { font-size:52px; margin-bottom:12px; }

    /* ── Modal ── */
    .overlay {
      display:none; position:fixed; inset:0;
      background:rgba(30,27,75,0.5); backdrop-filter:blur(4px);
      z-index:999; align-items:center; justify-content:center;
    }
    .overlay.open { display:flex; }
    .modal {
      background:var(--white); border-radius:20px; padding:32px;
      width:100%; max-width:460px; box-shadow:0 20px 60px rgba(0,0,0,0.2);
      animation:popIn 0.25s ease;
    }
    .modal h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:22px; color:var(--accent); }
    .field { margin-bottom:15px; }
    .field label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin-bottom:6px; }
    .field input, .field select, .field textarea {
      width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
      font-family:'Nunito',sans-serif; font-size:14px; outline:none; transition:border 0.2s;
      background:var(--bg);
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); background:#fff; }
    .field textarea { min-height:80px; resize:vertical; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal-btns { display:flex; gap:10px; margin-top:22px; }
    .modal-btns button {
      flex:1; padding:12px; border-radius:10px; border:none;
      font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; cursor:pointer;
    }
    .modal-btns .save { background:var(--accent); color:#fff; transition:opacity 0.15s; }
    .modal-btns .save:hover { opacity:0.88; }
    .modal-btns .cancel { background:var(--bg); color:var(--muted); }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:24px; right:24px;
      background:var(--text); color:#fff;
      padding:13px 22px; border-radius:12px;
      font-size:14px; font-weight:600;
      transform:translateY(80px); opacity:0;
      transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index:9999; box-shadow:var(--shadow);
    }
    #toast.show { transform:translateY(0); opacity:1; }

    @media(max-width:700px) {
      .stats { grid-template-columns:1fr 1fr; padding:18px; }
      .cards, .toolbar { padding:0 14px 24px; }
      .toolbar { padding:14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Lead<span>Flow</span> CRM</div>
  <button onclick="openModal()">+ Add Lead</button>
</header>

<!-- Stats -->
<div class="stats">
  <div class="stat all">  <div class="stat-num" id="s-all">0</div>  <div class="stat-label">Total Leads</div></div>
  <div class="stat new">  <div class="stat-num" id="s-new">0</div>  <div class="stat-label">New</div></div>
  <div class="stat cont"> <div class="stat-num" id="s-cont">0</div> <div class="stat-label">Contacted</div></div>
  <div class="stat conv"> <div class="stat-num" id="s-conv">0</div> <div class="stat-label">Converted</div></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input class="search" id="searchBox" placeholder="🔍  Search by name, email or source..." oninput="render()"/>
  <div class="filters">
    <button class="ftab active" onclick="setFilter('all',this)">All</button>
    <button class="ftab" onclick="setFilter('new-lead',this)">New</button>
    <button class="ftab" onclick="setFilter('contacted',this)">Contacted</button>
    <button class="ftab" onclick="setFilter('converted',this)">Converted</button>
  </div>
</div>

<!-- Cards -->
<div class="cards" id="cardGrid"></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <h2 id="modalTitle">➕ Add New Lead</h2>
    <div class="row2">
      <div class="field"><label>Name *</label><input id="f-name" placeholder="Full name"/></div>
      <div class="field"><label>Email *</label><input id="f-email" type="email" placeholder="email@example.com"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="f-phone" placeholder="9876543210"/></div>
      <div class="field"><label>Source</label>
        <select id="f-source">
          <option>Website</option><option>Referral</option>
          <option>Social Media</option><option>Cold Call</option>
          <option>Email Campaign</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Status</label>
      <select id="f-status">
        <option value="new-lead">New</option>
        <option value="contacted">Contacted</option>
        <option value="converted">Converted</option>
      </select>
    </div>
    <div class="field"><label>Notes / Follow-up</label><textarea id="f-notes" placeholder="Add notes or follow-up details..."></textarea></div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveLead()">Save Lead ✓</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── Data (saved in browser localStorage) ────────────────────────────────────
  let leads = JSON.parse(localStorage.getItem('crm_leads') || '[]');
  let editId = null;
  let activeFilter = 'all';

  // Sample data on first load
  if (!leads.length) {
    leads = [
      { id: uid(), name: 'Priya Sharma',  email: 'priya@example.com',  phone: '9876543210', source: 'Website',     status: 'new-lead',  notes: 'Interested in web services.', date: today() },
      { id: uid(), name: 'Rahul Mehta',   email: 'rahul@startup.io',   phone: '9123456780', source: 'Referral',    status: 'contacted', notes: 'Follow up by Friday.',        date: today() },
      { id: uid(), name: 'Anjali Verma',  email: 'anjali@corp.com',    phone: '9988776655', source: 'Social Media', status: 'converted', notes: 'Signed contract for CRM.',    date: today() },
    ];
    save();
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function uid() { return Math.random().toString(36).slice(2,10); }
  function today() { return new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
  function save() { localStorage.setItem('crm_leads', JSON.stringify(leads)); }
  function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Stats ────────────────────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('s-all').textContent  = leads.length;
    document.getElementById('s-new').textContent  = leads.filter(l=>l.status==='new-lead').length;
    document.getElementById('s-cont').textContent = leads.filter(l=>l.status==='contacted').length;
    document.getElementById('s-conv').textContent = leads.filter(l=>l.status==='converted').length;
  }

  // ── Render Cards ─────────────────────────────────────────────────────────────
  function render() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    let list = leads.filter(l => {
      const matchFilter = activeFilter === 'all' || l.status === activeFilter;
      const matchSearch = !q || l.name.toLowerCase().includes(q) || l.email.toLowerCase().includes(q) || l.source.toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });

    updateStats();
    const grid = document.getElementById('cardGrid');

    if (!list.length) {
      grid.innerHTML = `<div class="empty"><div class="big">🔍</div>No leads found.</div>`;
      return;
    }

    const statusLabel = { 'new-lead':'New', 'contacted':'Contacted', 'converted':'Converted' };
    const nextStatus  = { 'new-lead':'contacted', 'contacted':'converted', 'converted':'new-lead' };
    const nextLabel   = { 'new-lead':'→ Mark Contacted', 'contacted':'→ Mark Converted', 'converted':'↺ Reset to New' };

    grid.innerHTML = list.map(l => `
      <div class="card ${l.status}">
        <div class="card-header">
          <div>
            <div class="lead-name">${esc(l.name)}</div>
            <div class="lead-email">${esc(l.email)}</div>
          </div>
          <span class="badge ${l.status}">${statusLabel[l.status]}</span>
        </div>
        <div class="card-info">📱 ${esc(l.phone||'—')}</div>
        <div class="card-info">📌 ${esc(l.source)} &nbsp;·&nbsp; 📅 ${esc(l.date)}</div>
        <div class="card-notes">${esc(l.notes)||'No notes added.'}</div>
        <div class="card-footer">
          <button class="btn-edit"   onclick="editLead('${l.id}')">✏️ Edit</button>
          <button class="btn-status" onclick="nextStep('${l.id}')">${nextLabel[l.status]}</button>
          <button class="btn-del"    onclick="deleteLead('${l.id}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  // ── Filter ───────────────────────────────────────────────────────────────────
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Modal ────────────────────────────────────────────────────────────────────
  function openModal(lead = null) {
    editId = lead ? lead.id : null;
    document.getElementById('modalTitle').textContent = lead ? '✏️ Edit Lead' : '➕ Add New Lead';
    document.getElementById('f-name').value   = lead?.name   || '';
    document.getElementById('f-email').value  = lead?.email  || '';
    document.getElementById('f-phone').value  = lead?.phone  || '';
    document.getElementById('f-source').value = lead?.source || 'Website';
    document.getElementById('f-status').value = lead?.status || 'new-lead';
    document.getElementById('f-notes').value  = lead?.notes  || '';
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; }
  function closeOverlay(e) { if (e.target.id === 'overlay') closeModal(); }

  // ── Save ─────────────────────────────────────────────────────────────────────
  function saveLead() {
    const name  = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    if (!name || !email) { toast('⚠️ Name and email are required!'); return; }

    if (editId) {
      const i = leads.findIndex(l => l.id === editId);
      leads[i] = { ...leads[i], name, email,
        phone:  document.getElementById('f-phone').value.trim(),
        source: document.getElementById('f-source').value,
        status: document.getElementById('f-status').value,
        notes:  document.getElementById('f-notes').value.trim(),
      };
      toast('✅ Lead updated!');
    } else {
      leads.unshift({ id: uid(), name, email,
        phone:  document.getElementById('f-phone').value.trim(),
        source: document.getElementById('f-source').value,
        status: document.getElementById('f-status').value,
        notes:  document.getElementById('f-notes').value.trim(),
        date:   today(),
      });
      toast('✅ Lead added!');
    }
    save(); closeModal(); render();
  }

  // ── Edit / Delete / Next Step ─────────────────────────────────────────────────
  function editLead(id)   { openModal(leads.find(l => l.id === id)); }

  function deleteLead(id) {
    if (!confirm('Delete this lead?')) return;
    leads = leads.filter(l => l.id !== id);
    save(); render(); toast('🗑️ Lead deleted!');
  }

  function nextStep(id) {
    const next = { 'new-lead':'contacted', 'contacted':'converted', 'converted':'new-lead' };
    const l = leads.find(l => l.id === id);
    l.status = next[l.status];
    save(); render(); toast('✅ Status updated!');
  }

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
